name: Gemini Agent Issue Solver

on:
  workflow_dispatch:
  issues:
    types: [opened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-gemini-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      workflows: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        run: |
          mkdir -p /home/runner/.gemini
          chmod 777 /home/runner/.gemini
          git rm --cached box5 || true

      - name: Fetch Oldest Issue
        id: fetch-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_DATA=$(gh issue list --search "state:open sort:created-asc" --limit 1 --json number,title,body)

          if [ "$ISSUE_DATA" == "[]" ] || [ -z "$ISSUE_DATA" ]; then
            echo "No open issues found. Exiting."
            exit 0
          fi

          echo "title=$(echo "$ISSUE_DATA" | jq -r '.[0].title')" >> $GITHUB_OUTPUT
          echo "number=$(echo "$ISSUE_DATA" | jq -r '.[0].number')" >> $GITHUB_OUTPUT
          {
            echo "body<<GITHUB_EOF"
            echo "$ISSUE_DATA" | jq -r '.[0].body'
            echo "GITHUB_EOF"
          } >> $GITHUB_OUTPUT

      - name: Run Gemini Agent
        id: gemini-run
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-3.1-flash-lite-preview
          prompt: |
            You are an expert software engineer. Fix the GitHub issue below by editing files directly. Work autonomously — do not ask questions.

            ## Issue #${{ steps.fetch-issue.outputs.number }}: ${{ steps.fetch-issue.outputs.title }}

            ${{ steps.fetch-issue.outputs.body }}

            ## Steps
            1. **Explore** — map the repo: `find . -not -path './.git/*' -not -path './.gemini/*' -type f | sort`
            2. **Read** — open every file relevant to the issue.
            3. **Fix** — apply the minimal change using shell commands (sed, awk, tee, or rewrite the file).
            4. **Verify** — `cat` changed files to confirm correctness.

            ## Rules
            - Minimal, targeted changes only — touch nothing unrelated.
            - Never modify `.gemini/`, `gemini-artifacts/`, or any git internals.
            - Never run `git` commands.
            - If the issue is ambiguous, use best judgment and implement the most reasonable fix.

      - name: Display Token Usage
        if: steps.fetch-issue.outputs.number != ''
        run: |
          if [ -f "gemini-artifacts/stdout.log" ]; then
            echo "=== Gemini Token Usage ==="
            read -r INPUT_TOKENS OUTPUT_TOKENS TOTAL_TOKENS < <(
              jq -r '[
                (.usageMetadata.promptTokenCount // .stats.inputTokens // .usage.input_tokens // "N/A"),
                (.usageMetadata.candidatesTokenCount // .stats.outputTokens // .usage.output_tokens // "N/A"),
                (.usageMetadata.totalTokenCount // .stats.totalTokens // .usage.total_tokens // "N/A")
              ] | @tsv' gemini-artifacts/stdout.log 2>/dev/null
            ) || true
            if [ "${INPUT_TOKENS:-N/A}" != "N/A" ] || [ "${OUTPUT_TOKENS:-N/A}" != "N/A" ]; then
              echo "Input tokens:  ${INPUT_TOKENS:-N/A}"
              echo "Output tokens: ${OUTPUT_TOKENS:-N/A}"
              echo "Total tokens:  ${TOTAL_TOKENS:-N/A}"
              {
                echo "## 📊 Gemini Token Usage"
                echo "| Metric | Count |"
                echo "|--------|-------|"
                echo "| Input tokens | ${INPUT_TOKENS:-N/A} |"
                echo "| Output tokens | ${OUTPUT_TOKENS:-N/A} |"
                echo "| Total tokens | ${TOTAL_TOKENS:-N/A} |"
              } >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Token usage data not found in response. Available keys:"
              jq 'keys' gemini-artifacts/stdout.log 2>/dev/null || true
            fi
          else
            echo "No Gemini artifacts found; token usage unavailable."
          fi

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.fetch-issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.fetch-issue.outputs.title }}
        run: |
          rm -rf gemini-artifacts

          if [ -n "$(git status --porcelain)" ]; then
            BRANCH_NAME="gemini-fix-issue-${ISSUE_NUMBER}"
            SAFE_TITLE="${ISSUE_TITLE:0:72}"

            git config --global user.name "Gemini Agent"
            git config --global user.email "agent@gemini.ai"

            git checkout -b "$BRANCH_NAME" || git checkout "$BRANCH_NAME"

            git add .
            git reset .gemini/

            if [ -z "$(git status --porcelain)" ]; then
              echo "No code changes detected after cleanup."
              exit 0
            fi

            git commit -m "fix: resolve issue #${ISSUE_NUMBER} — ${SAFE_TITLE}"

            git push origin "$BRANCH_NAME" --force

            PR_EXISTS=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' 2>/dev/null) || {
              echo "::debug::Could not list PRs for branch ${BRANCH_NAME}; assuming no PR exists."
              PR_EXISTS=""
            }
            if [ -z "$PR_EXISTS" ]; then
              if gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                "/repos/${GITHUB_REPOSITORY}/pulls" \
                -f title="fix: #${ISSUE_NUMBER} — ${SAFE_TITLE}" \
                -f body="Closes #${ISSUE_NUMBER} **Issue:** ${ISSUE_TITLE} This PR was automatically generated by the Gemini Agent." \
                -f head="$BRANCH_NAME" \
                -f base="main" 2>&1; then
                echo "PR created successfully."
              else
                echo "::warning::Could not create PR automatically. Branch '${BRANCH_NAME}' has been pushed."
                gh issue comment "$ISSUE_NUMBER" \
                  --body "✅ Branch \`${BRANCH_NAME}\` has been created with a fix. Please [open a PR manually](https://github.com/${GITHUB_REPOSITORY}/compare/${BRANCH_NAME}) or enable **Allow GitHub Actions to create and approve pull requests** in Settings → Actions → General." \
                  || true
                echo "Commented on issue #${ISSUE_NUMBER} with branch information."
              fi
            else
              echo "PR already exists: #$PR_EXISTS. Branch updated."
            fi
          else
            echo "No changes detected."
          fi
