name: Gemini Agent Issue Solver & Visionary

on:
  workflow_dispatch:
  issues:
    types: [opened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-gemini-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      workflows: write # Added to resolve the "remote rejected" error

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        run: |
          mkdir -p /home/runner/.gemini
          chmod 777 /home/runner/.gemini
          git rm --cached box5 || true

      - name: Fetch Oldest Issue
        id: fetch-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_DATA=$(gh issue list --search "state:open sort:created-asc" --limit 1 --json number,title,body)
          if [ "$ISSUE_DATA" == "[]" ] || [ -z "$ISSUE_DATA" ]; then
            echo "No open issues found. Skipping fix step."
            echo "run_fix=false" >> $GITHUB_OUTPUT
          else
            echo "run_fix=true" >> $GITHUB_OUTPUT
            echo "title=$(echo "$ISSUE_DATA" | jq -r '.[0].title')" >> $GITHUB_OUTPUT
            echo "number=$(echo "$ISSUE_DATA" | jq -r '.[0].number')" >> $GITHUB_OUTPUT
            {
              echo "body<<GITHUB_EOF"
              echo "$ISSUE_DATA" | jq -r '.[0].body'
              echo "GITHUB_EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Run Gemini Agent (Fix Issue)
        if: steps.fetch-issue.outputs.run_fix == 'true'
        id: gemini-run
        uses: google-github-actions/run-gemini-cli@v0.1.21
        timeout-minutes: 1 # 1-minute timeout added here
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-3.1-flash-lite-preview
          prompt: |
            You are an expert engineer. Fix this issue:
            #${{ steps.fetch-issue.outputs.number }}: ${{ steps.fetch-issue.outputs.title }}
            ${{ steps.fetch-issue.outputs.body }}
            
            Rules: Minimal changes, no git commands, do not touch .github/workflows/.

      # ... [Token Usage and PR Creation logic stays the same] ...

      - name: Create Pull Request
        if: steps.fetch-issue.outputs.run_fix == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.fetch-issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.fetch-issue.outputs.title }}
        run: |
          # [Your existing PR logic here...]
          # (Ensure this script finishes by pushing the branch and opening the PR)

      - name: Gemini Visionary (Generate New Idea)
        id: gemini-vision
        uses: google-github-actions/run-gemini-cli@v0.1.21
        timeout-minutes: 1 # 1-minute timeout
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-3.1-flash-lite-preview
          prompt: |
            Review the current codebase structure and suggest ONE high-value improvement, feature, or refactor.
            Output ONLY a JSON object with "title" and "body" keys. 
            Keep the suggestion technical and specific to this project.
            
            Files in repo:
            $(find . -maxdepth 2 -not -path '*/.*')

      - name: Open New Issue for Idea
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract JSON from Gemini output
          IDEA_JSON=$(cat gemini-artifacts/stdout.log | grep -o '{.*}')
          NEW_TITLE=$(echo "$IDEA_JSON" | jq -r '.title')
          NEW_BODY=$(echo "$IDEA_JSON" | jq -r '.body')
          
          if [ -n "$NEW_TITLE" ] && [ "$NEW_TITLE" != "null" ]; then
            gh issue create --title "💡 Idea: $NEW_TITLE" --body "$NEW_BODY" --label "enhancement"
            echo "New idea proposed: $NEW_TITLE"
          fi
