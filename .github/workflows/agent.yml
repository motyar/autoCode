name: Gemini Agent Issue Solver & Visionary

on:
  workflow_dispatch:
  issues:
    types: [opened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GEMINI_MODEL: gemini-2.0-flash-lite
  GEMINI_CLI_VERSION: "0.1.21"

jobs:
  run-gemini-agent:
    # Prevent infinite loop: skip when a bot opens an issue (e.g. the visionary step)
    if: github.event_name == 'workflow_dispatch' || github.event.issue.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Gemini CLI
        id: cache-gemini
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          # Bump the version suffix (e.g. v2, v3) to force a fresh install
          key: gemini-cli-${{ runner.os }}-${{ env.GEMINI_CLI_VERSION }}

      - name: Setup Environment & Install Gemini CLI
        run: |
          mkdir -p ~/.gemini ~/.npm-global
          npm config set prefix ~/.npm-global
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH
          if [ "${{ steps.cache-gemini.outputs.cache-hit }}" != "true" ]; then
            npm install -g @google/gemini-cli@${{ env.GEMINI_CLI_VERSION }}
          fi
          git rm --cached box5 2>/dev/null || true

      - name: Fetch Oldest Issue
        id: fetch-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_DATA=$(gh issue list --search "state:open sort:created-asc" --limit 1 --json number,title,body)
          if [ "$ISSUE_DATA" == "[]" ] || [ -z "$ISSUE_DATA" ]; then
            echo "No open issues found."
            echo "run_fix=false" >> $GITHUB_OUTPUT
          else
            echo "run_fix=true" >> $GITHUB_OUTPUT
            echo "title=$(echo "$ISSUE_DATA" | jq -r '.[0].title')" >> $GITHUB_OUTPUT
            echo "number=$(echo "$ISSUE_DATA" | jq -r '.[0].number')" >> $GITHUB_OUTPUT
            {
              echo "body<<GITHUB_EOF"
              echo "$ISSUE_DATA" | jq -r '.[0].body'
              echo "GITHUB_EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Run Gemini Agent (Fix Issue)
        if: steps.fetch-issue.outputs.run_fix == 'true'
        uses: google-github-actions/run-gemini-cli@v0.1.21
        timeout-minutes: 5
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: ${{ env.GEMINI_MODEL }}
          prompt: |
            You are an expert engineer. Fix this issue by editing files:
            Issue #${{ steps.fetch-issue.outputs.number }}: ${{ steps.fetch-issue.outputs.title }}
            ${{ steps.fetch-issue.outputs.body }}

            Rules: Minimal changes, no git commands.

      - name: Create Pull Request
        if: steps.fetch-issue.outputs.run_fix == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.fetch-issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.fetch-issue.outputs.title }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH_NAME="gemini-fix-issue-${ISSUE_NUMBER}"
            git config --global user.name "Gemini Agent"
            git config --global user.email "agent@gemini.ai"
            git checkout -b "$BRANCH_NAME"
            git add .
            git commit -m "fix: resolve #${ISSUE_NUMBER}"
            git push origin "$BRANCH_NAME" --force
            gh pr create \
              --title "fix: #${ISSUE_NUMBER} — ${ISSUE_TITLE}" \
              --body "Closes #${ISSUE_NUMBER}" \
              --base main \
              --head "$BRANCH_NAME" || echo "PR already exists"
          else
            echo "No file changes for issue #${ISSUE_NUMBER}; skipping PR."
          fi

      - name: Gemini Visionary (Brainstorm New Idea)
        id: visionary
        timeout-minutes: 3
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          FILES_LIST=$(find . -maxdepth 2 -not -path '*/.*' | tr '\n' ' ')
          export FILES_LIST

          # Call the Gemini REST API directly — no second CLI install needed
          cat > /tmp/visionary_call.py << 'PYEOF'
          import json, subprocess, os, sys, re

          files_list = os.environ.get('FILES_LIST', '')
          api_key    = os.environ.get('GEMINI_API_KEY', '')
          model      = os.environ.get('GEMINI_MODEL', 'gemini-2.0-flash-lite')

          prompt = (
              "Analyze this repo structure and suggest ONE specific technical improvement or new feature.\n"
              f"Repo Context (Files): {files_list}\n\n"
              "IMPORTANT: Return ONLY a raw JSON object. "
              "Do NOT use markdown code blocks (no ```json).\n"
              'Format: {"title": "...", "body": "..."}'
          )

          payload = json.dumps({"contents": [{"parts": [{"text": prompt}]}]})

          result = subprocess.run(
              ['curl', '-s', '-X', 'POST',
               f'https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={api_key}',
               '-H', 'Content-Type: application/json',
               '-d', payload],
              capture_output=True, text=True
          )

          if result.returncode != 0:
              print(f"curl error: {result.stderr}", file=sys.stderr)
              sys.exit(1)

          try:
              response = json.loads(result.stdout)
              text = response['candidates'][0]['content']['parts'][0]['text']
          except Exception as e:
              print(f"Parse error: {e}\nRaw response: {result.stdout}", file=sys.stderr)
              sys.exit(1)

          # Strip markdown code fences if present, then extract first JSON object
          text = re.sub(r'```(?:json)?\s*', '', text).strip()
          match = re.search(r'\{.*\}', text, re.DOTALL)
          if not match:
              print(f"No JSON found in response: {text}", file=sys.stderr)
              sys.exit(1)

          try:
              obj = json.loads(match.group(0))
              print(json.dumps(obj))
          except json.JSONDecodeError as e:
              print(f"Invalid JSON: {e}\nText: {match.group(0)}", file=sys.stderr)
              sys.exit(1)
          PYEOF

          IDEA_JSON=$(python3 /tmp/visionary_call.py)
          echo "idea_json<<IDEA_EOF" >> $GITHUB_OUTPUT
          echo "$IDEA_JSON" >> $GITHUB_OUTPUT
          echo "IDEA_EOF" >> $GITHUB_OUTPUT

      - name: Open New Issue for Idea
        if: steps.visionary.outputs.idea_json != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IDEA_JSON: ${{ steps.visionary.outputs.idea_json }}
        run: |
          NEW_TITLE=$(echo "$IDEA_JSON" | jq -r '.title // empty')
          NEW_BODY=$(echo "$IDEA_JSON" | jq -r '.body // empty')

          if [ -z "$NEW_TITLE" ]; then
            echo "Empty title; skipping issue creation."
            exit 0
          fi

          # Ensure the label exists before using it
          gh label create "enhancement" \
            --description "New feature or request" \
            --color "a2eeef" || true

          gh issue create \
            --title "💡 Idea: $NEW_TITLE" \
            --body "$NEW_BODY" \
            --label "enhancement"
