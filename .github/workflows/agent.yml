name: Gemini Agent Issue Solver & Visionary

on:
  workflow_dispatch:
  issues:
    types: [opened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-gemini-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
     
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        run: |
          mkdir -p /home/runner/.gemini
          chmod 777 /home/runner/.gemini
          git rm --cached box5 || true

      - name: Fetch Oldest Issue
        id: fetch-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_DATA=$(gh issue list --search "state:open sort:created-asc" --limit 1 --json number,title,body)
          if [ "$ISSUE_DATA" == "[]" ] || [ -z "$ISSUE_DATA" ]; then
            echo "No open issues found."
            echo "run_fix=false" >> $GITHUB_OUTPUT
          else
            echo "run_fix=true" >> $GITHUB_OUTPUT
            echo "title=$(echo "$ISSUE_DATA" | jq -r '.[0].title')" >> $GITHUB_OUTPUT
            echo "number=$(echo "$ISSUE_DATA" | jq -r '.[0].number')" >> $GITHUB_OUTPUT
            {
              echo "body<<GITHUB_EOF"
              echo "$ISSUE_DATA" | jq -r '.[0].body'
              echo "GITHUB_EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Run Gemini Agent (Fix Issue)
        if: steps.fetch-issue.outputs.run_fix == 'true'
        uses: google-github-actions/run-gemini-cli@v0.1.21
        timeout-minutes: 5
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-3.1-flash-lite-preview
          prompt: |
            You are an expert engineer. Fix this issue by editing files:
            Issue #${{ steps.fetch-issue.outputs.number }}: ${{ steps.fetch-issue.outputs.title }}
            ${{ steps.fetch-issue.outputs.body }}
            
            Rules: Minimal changes, no git commands.

      - name: Create Pull Request
        if: steps.fetch-issue.outputs.run_fix == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.fetch-issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.fetch-issue.outputs.title }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH_NAME="gemini-fix-issue-${ISSUE_NUMBER}"
            git config --global user.name "Gemini Agent"
            git config --global user.email "agent@gemini.ai"
            git checkout -b "$BRANCH_NAME"
            git add .
            git commit -m "fix: resolve #${ISSUE_NUMBER}"
            git push origin "$BRANCH_NAME" --force
            gh pr create --title "fix: #${ISSUE_NUMBER} — ${ISSUE_TITLE}" --body "Closes #${ISSUE_NUMBER}" --base main --head "$BRANCH_NAME" || echo "PR already exists"
          fi

      - name: Prepare Repo Context
        id: repo-context
        run: |
          # Create a list of files to help Gemini understand the project structure
          echo "FILES_LIST=$(find . -maxdepth 2 -not -path '*/.*' | tr '\n' ' ')" >> $GITHUB_ENV

      - name: Gemini Visionary (Brainstorm New Idea)
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-3.1-flash-lite-preview
          prompt: |
            Analyze this repo structure and suggest ONE specific technical improvement or new feature.
            Repo Context (Files): ${{ env.FILES_LIST }}

            IMPORTANT: Return ONLY a raw JSON object. Do NOT use markdown code blocks (no ```json).
            Format: {"title": "...", "body": "..."}

      - name: Open New Issue for Idea
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "gemini-artifacts/stdout.log" ]; then
            # Use python or a more robust way to extract JSON if Gemini includes text before/after
            # This script pulls the first valid JSON object it finds in the log
            IDEA_JSON=$(python3 -c "import json, re, sys; content = open('gemini-artifacts/stdout.log').read(); match = re.search(r'\{.*\}', content, re.DOTALL); print(match.group(0)) if match else sys.exit(1)") || true
            
            if [ -n "$IDEA_JSON" ]; then
              NEW_TITLE=$(echo "$IDEA_JSON" | jq -r '.title // empty')
              NEW_BODY=$(echo "$IDEA_JSON" | jq -r '.body // empty')
              
              if [ -n "$NEW_TITLE" ]; then
                gh issue create --title "💡 Idea: $NEW_TITLE" --body "$NEW_BODY" --label "enhancement"
              fi
            else
              echo "Error: Could not find valid JSON in Gemini output."
              cat gemini-artifacts/stdout.log # Debugging
            fi
          fi
